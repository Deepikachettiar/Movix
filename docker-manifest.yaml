# version: '3.8'   # removed obsolete version key

services:
  # Database Tier
  mongodb:
    image: mongo:6.0
    container_name: movix-db
    ports:
      - "27017:27017"
    volumes:
      - movix-db-data:/data/db
    networks:
      - movix-internal-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend Application Logic Tier
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: movix-api
    ports:
      - "5000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/movix
      - PORT=3000
      - JWT_SECRET=local_dev_only_placeholder_secret
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - TMDB_API_KEY=${TMDB_API_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - movix-internal-net

  # Frontend User Interface Serving Tier
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
        - VITE_API_URL=http://localhost:5000
        - VITE_BASE_URL=http://localhost:3000
        - VITE_TMDB_IMAGE_BASE_URL=https://image.tmdb.org/t/p/original
        - VITE_CURRENCY=₹
    container_name: movix-ui
    ports:
      - "3000:8080"
    depends_on:
      - backend
    networks:
      - movix-internal-net

# Network overlays and persistent volume paths
networks:
  movix-internal-net:
    driver: bridge

volumes:
  movix-db-data: