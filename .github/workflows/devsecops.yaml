name: 3-Tier DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your React and Node.js code onto the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      # 2. SAST SCAN: Scan all raw source code for bugs and hardcoded secrets
      - name: SonarCloud SAST Scan (Code Quality)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}

      # 3. IaC & CONFIG SCAN: Scan Docker Compose, Dockerfiles, and Terraform for misconfigurations
      - name: Trivy IaC & Configuration Scan (Database & Infra)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: false
          exit-code: '1' # Fail the pipeline if CRITICAL/HIGH security issues exist in configs
          severity: 'CRITICAL,HIGH'

      # 4. Authenticate with Docker Hub so we can push our secure images later
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ==========================================
      # BACKEND (NODE.JS) PIPELINE 
      # ==========================================
      
      - name: Build Backend Docker Image
        # Point build context to the correct './server' directory
        run: docker build --no-cache --pull -t ${{ secrets.DOCKER_USERNAME }}/movix-backend:latest ./server

      - name: Trivy Scan (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/movix-backend:latest'
          format: 'table'
          exit-code: '1' # CRASH pipeline if CRITICAL/HIGH vulnerabilities are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend to Docker Hub
        # Only runs if Trivy passes with 0 Critical/High issues
        run: docker push ${{ secrets.DOCKER_USERNAME }}/movix-backend:latest

      # ==========================================
      # FRONTEND (REACT/NGINX) PIPELINE 
      # ==========================================

      - name: Build Frontend Docker Image
        # Point build context to the correct './client' directory
        run: docker build --no-cache --pull -t ${{ secrets.DOCKER_USERNAME }}/movix-frontend:latest ./client

      - name: Trivy Scan (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/movix-frontend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Frontend to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/movix-frontend:latest