name: 3-Tier DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest

    steps:
      # ==========================================
      # Checkout Repository
      # ==========================================
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ==========================================
      # Setup Java for Sonar
      # ==========================================
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ==========================================
      # SonarCloud Scan
      # ==========================================
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}

      # ==========================================
      # Trivy Configuration Scan
      # ==========================================
      - name: Trivy IaC Scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: config
          hide-progress: false
          severity: CRITICAL,HIGH
          exit-code: '1'

      # ==========================================
      # Docker Login
      # ==========================================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ==========================================
      # Build Backend
      # ==========================================
      - name: Build Backend Docker Image
        run: |
          docker build \
            --no-cache \
            --pull \
            -t ${{ secrets.DOCKER_USERNAME }}/movix-backend:latest \
            ./server

      # ==========================================
      # Debug Backend Image
      # ==========================================
      - name: Debug Backend Image
        run: |
          docker images
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/movix-backend:latest node -v
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/movix-backend:latest npm -v
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/movix-backend:latest npm ls picomatch || true
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/movix-backend:latest npm ls sigstore || true

      # ==========================================
      # Trivy Backend Scan
      # ==========================================
      - name: Trivy Backend Scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/movix-backend:latest
          format: table
          severity: CRITICAL,HIGH
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '1'

      # ==========================================
      # Push Backend
      # ==========================================
      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/movix-backend:latest

      # ==========================================
      # Build Frontend
      # ==========================================
      - name: Build Frontend Docker Image
        run: |
          docker build \
            --no-cache \
            --pull \
            -t ${{ secrets.DOCKER_USERNAME }}/movix-frontend:latest \
            ./client

      # ==========================================
      # Debug Frontend Image
      # ==========================================
      - name: Debug Frontend Image
        run: |
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/movix-frontend:latest nginx -v

      # ==========================================
      # Trivy Frontend Scan
      # ==========================================
      - name: Trivy Frontend Scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/movix-frontend:latest
          format: table
          severity: CRITICAL,HIGH
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '1'

      # ==========================================
      # Push Frontend
      # ==========================================
      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/movix-frontend:latest