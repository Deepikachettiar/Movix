name: 3-Tier DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest

    steps:
      # ==========================================
      # Checkout Repository
      # ==========================================
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ==========================================
      # SonarCloud Scan
      # ==========================================
      - name: SonarCloud SAST Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}

      # ==========================================
      # Trivy IaC Scan
      # ==========================================
      - name: Trivy IaC & Configuration Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          hide-progress: false
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      # ==========================================
      # Docker Login
      # ==========================================
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ==========================================
      # Build Backend Image
      # ==========================================
      - name: Build Backend Docker Image
        run: |
          docker build \
            --no-cache \
            --pull \
            -t ${{ secrets.DOCKER_USERNAME }}/movix-backend:latest \
            ./server

      # ==========================================
      # Debug Backend Image
      # ==========================================
      - name: Debug Backend Image
        run: |
          docker images
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/movix-backend:latest node -v
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/movix-backend:latest npm -v
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/movix-backend:latest npm ls picomatch || true
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/movix-backend:latest npm ls sigstore || true

      # ==========================================
      # Trivy Backend Scan
      # ==========================================
      - name: Trivy Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/movix-backend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # ==========================================
      # Push Backend Image
      # ==========================================
      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/movix-backend:latest

      # ==========================================
      # Build Frontend Image
      # ==========================================
      - name: Build Frontend Docker Image
        run: |
          docker build \
            --no-cache \
            --pull \
            -t ${{ secrets.DOCKER_USERNAME }}/movix-frontend:latest \
            ./client

      # ==========================================
      # Debug Frontend Image
      # ==========================================
      - name: Debug Frontend Image
        run: |
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/movix-frontend:latest nginx -v

      # ==========================================
      # Trivy Frontend Scan
      # ==========================================
      - name: Trivy Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/movix-frontend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # ==========================================
      # Push Frontend Image
      # ==========================================
      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/movix-frontend:latest